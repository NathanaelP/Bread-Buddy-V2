<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pantry Dater</title>

  <!-- PWA -->
  <meta name="theme-color" content="#110d08" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pantry Dater" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title">
      <h1>Pantry Dater</h1>
      <p class="sub">Product → Days after thaw → Label date</p>
    </div>

    <div class="today">
      <span id="todayLabel"></span>
      <button id="refreshBtn" class="btn small" type="button">Refresh</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Add / Edit Item</h2>

      <form id="itemForm" autocomplete="off">
        <input type="hidden" id="editId" value="" />

        <label>
          Product name
          <input id="productName" type="text" placeholder="Pan Sabao" required />
        </label>

        <label>
          Days after thaw
          <input id="daysAfter" type="number" min="0" step="1" placeholder="10" required />
        </label>

        <div class="row">
          <button class="btn" type="submit" id="saveBtn">Save</button>
          <button class="btn ghost" type="button" id="clearBtn">Clear</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="row spread">
        <h2>Items</h2>
        <div class="row gap">
          <button class="btn ghost small" id="exportBtn" type="button">Export JSON</button>
          <label class="btn ghost small fileBtn">
            Import JSON
            <input id="importFile" type="file" accept="application/json" />
          </label>
        </div>
      </div>

      <label class="search">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Type to filter…" />
      </label>

      <div id="cardsWrap" class="cardsWrap" aria-live="polite"></div>

      <p class="hint">
        Tip: Label date is calculated as <b>today + days</b> (local time).
      </p>
    </section>
    <section class="card" id="prodSection">
      <h2>Production Calculator</h2>

      <div class="prodInputRow">
        <label>
          Total Loaves
          <input id="totalLoaves" type="number" min="0" step="1" placeholder="320" />
        </label>
        <label>
          Morning %
          <input id="morningPct" type="number" min="0" max="100" step="0.1" placeholder="54" />
        </label>
      </div>

      <div id="allocWrap" class="allocWrap"></div>

      <div class="row spread" style="margin-top:14px">
        <p class="metaLabel" style="margin:0">Bread Types</p>
        <button id="addTypeBtn" class="btn small ghost" type="button">+ Add Type</button>
      </div>

      <form id="typeForm" autocomplete="off" style="display:none; margin-top:10px">
        <input type="hidden" id="typeEditId" value="" />
        <label>
          Name
          <input id="typeName" type="text" placeholder="White" required />
        </label>
        <label>
          % of Total
          <input id="typePct" type="number" min="0" max="100" step="0.1" placeholder="61" required />
        </label>
        <div class="row">
          <button class="btn" type="submit" id="saveTypeBtn">Save Type</button>
          <button class="btn ghost" type="button" id="cancelTypeBtn">Cancel</button>
        </div>
      </form>

      <div id="typesWrap" class="typesWrap"></div>
    </section>
  </main>

  <footer class="footer">
    <small>Offline storage: saved on this device (localStorage).</small>
  </footer>

  <script src="app.js"></script>
  <script src="production.js"></script>
  <script>
    // Register Service Worker (PWA offline support)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
